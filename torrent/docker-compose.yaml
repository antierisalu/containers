services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: always
    ports:
        - 6081:10497
        - 6081:10497/udp
        - 6011:6011
    cap_add:
        - NET_ADMIN
    devices:
        - /dev/net/tun
    environment:
        - TZ="${TIMEZONE}"
        - VPN_SERVICE_PROVIDER="${W_PROVIDER}"
        - VPN_TYPE="${W_TYPE}"

        - WIREGUARD_ENDPOINT_IP="${W_ENDPOINT_IP}"
        - WIREGUARD_ENDPOINT_PORT=443
        - WIREGUARD_PUBLIC_KEY="${W_PUBLIC_KEY}"
        - WIREGUARD_PRIVATE_KEY="${W_PRIVATE_KEY}"
        - WIREGUARD_ADDRESSES="${W_ADDRESSES}"
        - WIREGUARD_PRESHARED_KEY="${W_PRESHARED_KEY}"

    healthcheck:
      test: ["CMD-SHELL", "/gluetun-entrypoint healthcheck"]
      interval: 5m
      timeout: 10s
      retries: 3

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    container_name: qbittorrent
    network_mode: "service:gluetun"
    restart: always
    volumes:
      - ./:/config
      - /srv/nas:/data # /data/downloads ! in qBittorrent
      - /srv/incomplete:/data/incomplete # /incomplete ! in qBittorrent
    environment:
      PUID: 1000
      PGID: 1000
      TZ: "${TIMEZONE}"
      WEBUI_PORT: 6011
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf google.com > /dev/null || exit 1"]
      interval: 5m
      timeout: 5m
      retries: 3

  mousehole:
    container_name: mousehole
    image: tmmrtn/mousehole:latest
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy # wait for the VPN tunnel before attaching
    environment:
      TZ: "${TIMEZONE}" # Set to your timezone for localization
      MOUSEHOLE_AUTH_PASSWORD: "${MS_PASSWORD}"
      MOUSEHOLE_AUTH_TOKEN: "${MS_TOKEN}"
    volumes:
      # persist cookie data across container restarts
      - "./mousehole:/var/lib/mousehole"
    restart: unless-stopped
