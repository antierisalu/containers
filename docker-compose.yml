services:

  nginx:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx
    ports:
        - 80:80
        - 81:81
    volumes:
        - ./nginx/nginx_data:/data
        - ./nginx/letsencrypt:/etc/letsencrypt
    networks:
        - seafile-net
        - media-net
        - monitoring-net
        - assistant-net
        - servers-net
        - deposito-net
        - cloud-net
    extra_hosts:
        - "host.docker.internal:host-gateway"
    restart: unless-stopped

  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=300

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:2.21.0-alpine
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - VIRTUAL_HOST=${PORTAINER_HOSTNAME}
      - VIRTUAL_PORT=9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer:/data
    networks:
      - monitoring-net

  watchtower:
    container_name: watchtower
    restart: unless-stopped
    image: nickfedor/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --schedule "0 5 4 * * 2" --cleanup

  cloudflare-root:
    container_name: cloudflare-root
    image: oznu/cloudflare-ddns:latest
    restart: unless-stopped
    environment:
      - API_KEY=${CLOUDFLARE_API_KEY}
      - ZONE=${CLOUDFLARE_ZONE}
#      - SUBDOMAIN=@
      - PROXIED=true
      - TZ=€{TIMEZONE}

  cloudflare-ssh:
    container_name: cloudflare-ssh
    image: oznu/cloudflare-ddns:latest
    restart: unless-stopped
    environment:
      - API_KEY=${CLOUDFLARE_API_KEY}
      - ZONE=${CLOUDFLARE_ZONE}
      - SUBDOMAIN=ssh
      - PROXIED=false
      - TZ=€{TIMEZONE}

networks:

  deposito-net:
    external: true

  seafile-net:
    external: true
    # internal: true
  
  cloud-net:
    external: true
    # internal: true

  monitoring-net:
    external: true
    internal: true

  media-net:
    external: true
    internal: true

  assistant-net:
    external: true

  servers-net:
    external: true

include:
  - monitor/docker-compose.yaml

  - torrent/docker-compose.yaml

  - home-assistant/docker-compose.yaml

  - seafile/docker-compose.yaml

  - jellyfin/docker-compose.yaml

  - audiobookshelf/docker-compose.yaml

  - servers/docker-compose.yaml

  - pihole/docker-compose.yaml

  - immich/docker-compose.yml
